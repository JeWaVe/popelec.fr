services:
  migrate:
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URI=postgresql://payload:${POSTGRES_PASSWORD}@postgres:5432/popelec
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  app:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URI=postgresql://payload:${POSTGRES_PASSWORD}@postgres:5432/popelec
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=https://popelec.fr
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - MAINTENANCE_MODE=true
      - SEAFILE_URL=http://seafile:80
      - NEXT_PUBLIC_SEAFILE_URL=https://files.popelec.fr
      - SEAFILE_ADMIN_TOKEN=${SEAFILE_ADMIN_TOKEN}
      - SEAFILE_ENCRYPTION_KEY=${SEAFILE_ENCRYPTION_KEY}
    volumes:
      - media_data:/app/media
      # Claude CLI subscription credentials (read-only). Used by the
      # interactive scan-supplier wizard. The container's app process runs
      # as the `nextjs` system user (uid 1001), so the Claude CLI looks at
      # /home/nextjs/.claude. The host directory /root/.claude must be
      # readable by uid 1001 from inside the container (chmod a+rX).
      - /root/.claude:/home/nextjs/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: popelec
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d popelec"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
      - seafile

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  seafile-db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${SEAFILE_MYSQL_ROOT_PASSWORD}
      MYSQL_LOG_CONSOLE: "true"
    volumes:
      - seafile_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    restart: always
    entrypoint: ["memcached", "-m", "256"]

  seafile:
    image: seafileltd/seafile-mc:11.0-latest
    restart: always
    volumes:
      - seafile_data:/shared
      - ./seafile/setup-https.sh:/etc/my_init.d/99-setup-https.sh:ro
    environment:
      DB_HOST: seafile-db
      DB_ROOT_PASSWD: ${SEAFILE_MYSQL_ROOT_PASSWORD}
      SEAFILE_ADMIN_EMAIL: ${SEAFILE_ADMIN_EMAIL}
      SEAFILE_ADMIN_PASSWORD: ${SEAFILE_ADMIN_PASSWORD}
      SEAFILE_SERVER_LETSENCRYPT: "false"
      SEAFILE_SERVER_HOSTNAME: files.popelec.fr
    depends_on:
      seafile-db:
        condition: service_healthy
      memcached:
        condition: service_started

volumes:
  pg_data:
  media_data:
  certbot_data:
  certbot_www:
  seafile_db_data:
  seafile_data:
