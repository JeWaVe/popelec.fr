# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=forgotpw:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=30r/m;

upstream app {
    server app:3000;
}

upstream seafile {
    server seafile:80;
}

# Hide nginx version globally
server_tokens off;

# --- popelec.fr HTTP → HTTPS ---

server {
    listen 80;
    server_name popelec.fr www.popelec.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- popelec.fr HTTPS ---

server {
    listen 443 ssl http2;
    server_name popelec.fr www.popelec.fr;

    ssl_certificate /etc/letsencrypt/live/popelec.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/popelec.fr/privkey.pem;

    # Block dotfiles (except .well-known)
    location ~ /\.(?!well-known) {
        return 403;
    }

    # Rate-limited: login
    location = /api/users/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers (must repeat in each location block)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Rate-limited: forgot-password
    location = /api/users/forgot-password {
        limit_req zone=forgotpw burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Rate-limited: API write operations (POST/PUT/PATCH/DELETE)
    location /api/ {
        limit_req zone=api_write burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Media files — long cache
    location /media/ {
        proxy_pass http://app;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Next.js static files — long cache
    location /_next/static/ {
        proxy_pass http://app;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Strip X-Powered-By from upstream responses
    proxy_hide_header X-Powered-By;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # All other requests
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    client_max_body_size 50M;
}

# --- files.popelec.fr HTTP → HTTPS ---

server {
    listen 80;
    server_name files.popelec.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- files.popelec.fr HTTPS ---

server {
    listen 443 ssl http2;
    server_name files.popelec.fr;

    ssl_certificate /etc/letsencrypt/live/files.popelec.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.popelec.fr/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Block Seafile server-info endpoint from anonymous access
    location = /api2/server-info/ {
        return 403;
    }

    # Cap upload size (10 GB max)
    client_max_body_size 10G;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        proxy_pass http://seafile;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
