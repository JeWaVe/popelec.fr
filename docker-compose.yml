services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: popelec
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d popelec"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    entrypoint: ["/app/docker/dev-entrypoint.sh"]
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      DATABASE_URI: postgresql://payload:payload@postgres:5432/popelec
      PAYLOAD_SECRET: dev-secret-do-not-use-in-production
      NEXT_TELEMETRY_DISABLED: "1"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@popelec.fr
      SMTP_USER: ""
      SMTP_PASS: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pg_data:
  node_modules:
  next_cache:
