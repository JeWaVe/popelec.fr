services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: popelec
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d popelec"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
